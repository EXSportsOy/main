<link rel="icon" type="image/png" sizes="64x64" href="/assets/brand/favicon-64.png" />

<link rel="preconnect" href="https://fonts.googleapis.com" />

<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="/assets/i18n/i18n.css" />
<script src="/assets/i18n/languages.js"></script>
<script src="/assets/i18n/lang-pick.js"></script>
<script>
(function () {
  var params = new URLSearchParams(window.location.search);
  if (params.get('pick') === '1') return;           // force language grid
  var codes = (window.EXS_LANGS || []).map(function (l) { return l.code; });
  var aliases = window.EXS_LANG_ALIASES || {};
  var remembered = null;
  try { remembered = localStorage.getItem('exs-lang'); } catch (e) {}
  var langs = navigator.languages || [navigator.language || 'en'];
  var pick = window.EXS_pickLanguage(langs, codes, aliases, remembered);
  // Preserve ?app=... and the #hash so report-bug redirects land on the right view.
  var qs = window.location.search || '';
  var hash = window.location.hash || '';
  window.location.replace(pick + '/index.html' + qs + hash);
})();
</script>
</head>
<body class="theme-pine">
  <main class="lang-page">
    <a class="nav__brand" href="/feedback/index.html?pick=1"><img src="/assets/brand/wordmark-ink.png" alt="EXSports Oy" /></a>
    <h1 class="display" style="margin-top:24px;">Feedback</h1>
    <p class="lead" style="margin-top:12px;">Choose your language — share feedback about our website or apps.</p>
    <div class="lang-grid" data-i18n-picker data-base="." data-file="index.html"></div>

    </noscript>
  </main>
  <script src="/assets/i18n/switcher.js"></script>
</body>
