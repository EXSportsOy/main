<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Heda — Brand Exploration</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600&family=Newsreader:ital,wght@0,400;0,500;1,400&family=Source+Serif+4:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; font-family: 'Inter Tight', system-ui, sans-serif; }
  * { box-sizing: border-box; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="android-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="brand-tokens.jsx"></script>
<script type="text/babel" src="heda-logos.jsx"></script>
<script type="text/babel" src="heda-head.jsx"></script>
<script type="text/babel" src="heda-brand-card.jsx"></script>
<script type="text/babel" src="heda-screens.jsx"></script>
<script type="text/babel" src="heda-marketing.jsx"></script>

<script type="text/babel" data-presets="react">
const { useState } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "primaryDirection": "sage",
  "primaryMark": "aura"
}/*EDITMODE-END*/;

function App() {
  const [tw, setTweak] = window.useTweaks(TWEAK_DEFAULTS);
  const dir = tw.primaryDirection;
  const mark = tw.primaryMark;
  const brand = window.HEDA_BRANDS[dir];
  const brands = ['sage', 'plum', 'stone'].map(k => window.HEDA_BRANDS[k]);

  // Wrapper for Android device frame around a screen — uses full bezel.
  const AD = window.AndroidDevice || (({ children }) => <div style={{ width: 390, height: 844, background: '#000', borderRadius: 36, overflow: 'hidden' }}>{children}</div>);

  return (
    <>
      <window.DesignCanvas>

        {/* ── Section 1: Three brand directions ─────────────── */}
        <window.DCSection id="brands" title="Brand directions" subtitle="Three quiet directions — pick one or mix">
          {brands.map(b => (
            <window.DCArtboard key={b.id} id={`brand-${b.id}`} label={`${b.short} · ${b.name}`} width={760} height={1080}>
              <window.BrandCard brand={b} mark={mark}/>
            </window.DCArtboard>
          ))}
        </window.DCSection>

        {/* ── Section 2: Logo mark studies ──────────────────── */}
        <window.DCSection id="marks" title="Logo mark studies" subtitle="Three abstract head-and-aura concepts. Switch globally with Tweaks.">
          <window.DCArtboard id="mark-aura" label="Aura · profile + ripple" width={420} height={420}>
            <MarkStudy brand={brand} mark="aura" name="Aura" rationale="Profile head with one offset ripple — the aura you feel before pain arrives."/>
          </window.DCArtboard>
          <window.DCArtboard id="mark-pulse" label="Pulse · concentric arcs" width={420} height={420}>
            <MarkStudy brand={brand} mark="pulse" name="Pulse" rationale="Concentric arcs from a point. The pain as a wave you can finally chart."/>
          </window.DCArtboard>
          <window.DCArtboard id="mark-crown" label="Crown · h-monogram" width={420} height={420}>
            <MarkStudy brand={brand} mark="crown" name="Crown" rationale="An ‘h’ that doubles as a brow and a small dot — the moment of pain."/>
          </window.DCArtboard>
        </window.DCSection>

        {/* ── Section 3: App icon variations ────────────────── */}
        <window.DCSection id="icons" title="App icon — Play Store" subtitle="Adaptive icon foreground/background pairings">
          <window.DCArtboard id="icons-grid" label="Icon grid · all directions × all marks" width={760} height={520}>
            <IconGrid brands={brands}/>
          </window.DCArtboard>
          <window.DCArtboard id="icons-launcher" label="Launcher preview · current direction" width={420} height={520}>
            <LauncherPreview brand={brand} mark={mark}/>
          </window.DCArtboard>
        </window.DCSection>

        {/* ── Section 4: Redesigned app screens ─────────────── */}
        <window.DCSection id="screens" title="App screens — redesigned" subtitle="Quieter, calmer, but the same features. Five core screens.">
          <window.DCArtboard id="screen-today" label="Today / Calendar" width={420} height={880}>
            <DeviceWrap><window.ScreenToday b={brand}/></DeviceWrap>
          </window.DCArtboard>
          <window.DCArtboard id="screen-log" label="Log event · with 3D head" width={420} height={880}>
            <DeviceWrap><window.ScreenLogEvent b={brand}/></DeviceWrap>
          </window.DCArtboard>
          <window.DCArtboard id="screen-analysis" label="Analysis · statistics" width={420} height={880}>
            <DeviceWrap><window.ScreenAnalysis b={brand}/></DeviceWrap>
          </window.DCArtboard>
          <window.DCArtboard id="screen-correlations" label="Analysis · correlations" width={420} height={880}>
            <DeviceWrap><window.ScreenCorrelations b={brand}/></DeviceWrap>
          </window.DCArtboard>
          <window.DCArtboard id="screen-reports" label="Reports · monthly" width={420} height={880}>
            <DeviceWrap><window.ScreenReports b={brand}/></DeviceWrap>
          </window.DCArtboard>
          <window.DCArtboard id="screen-settings" label="Settings" width={420} height={880}>
            <DeviceWrap><window.ScreenSettings b={brand}/></DeviceWrap>
          </window.DCArtboard>
          <window.DCArtboard id="screen-splash" label="Splash" width={420} height={880}>
            <DeviceWrap><window.ScreenSplash b={brand}/></DeviceWrap>
          </window.DCArtboard>
        </window.DCSection>

        {/* ── Section 5: Marketing ──────────────────────────── */}
        <window.DCSection id="marketing" title="Marketing" subtitle="Play Store assets, website, social">
          <window.DCArtboard id="feature" label="Play Store · feature graphic 1024×500" width={1024} height={500}>
            <window.FeatureGraphic brand={brand} mark={mark}/>
          </window.DCArtboard>

          <window.DCArtboard id="play-1" label="Play screenshot 1 · Today" width={360} height={720}>
            <window.PlayShot brand={brand} headline="Track quietly." sub="A single tap logs how today felt.">
              <DeviceWrap><window.ScreenToday b={brand}/></DeviceWrap>
            </window.PlayShot>
          </window.DCArtboard>
          <window.DCArtboard id="play-2" label="Play screenshot 2 · 3D head" width={360} height={720}>
            <window.PlayShot brand={brand} headline="Map the pain." sub="Paint where it hurts on a 3D head. Two fingers to rotate.">
              <DeviceWrap><window.ScreenLogEvent b={brand}/></DeviceWrap>
            </window.PlayShot>
          </window.DCArtboard>
          <window.DCArtboard id="play-3" label="Play screenshot 3 · Analysis" width={360} height={720}>
            <window.PlayShot brand={brand} headline="See the week." sub="Intensity, hours in pain, attack count — at a glance.">
              <DeviceWrap><window.ScreenAnalysis b={brand}/></DeviceWrap>
            </window.PlayShot>
          </window.DCArtboard>
          <window.DCArtboard id="play-4" label="Play screenshot 4 · Patterns" width={360} height={720}>
            <window.PlayShot brand={brand} headline="Notice patterns." sub="Heda links your data with sleep and steps from Health Connect.">
              <DeviceWrap><window.ScreenCorrelations b={brand}/></DeviceWrap>
            </window.PlayShot>
          </window.DCArtboard>
          <window.DCArtboard id="play-5" label="Play screenshot 5 · Reports" width={360} height={720}>
            <window.PlayShot brand={brand} headline="Bring it to your doctor." sub="Export PDF or CSV. Share only what you choose.">
              <DeviceWrap><window.ScreenReports b={brand}/></DeviceWrap>
            </window.PlayShot>
          </window.DCArtboard>

          <window.DCArtboard id="web-hero" label="Website · hero" width={1280} height={800}>
            <window.WebsiteHero brand={brand} mark={mark}/>
          </window.DCArtboard>

          <window.DCArtboard id="social-1" label="Social · quote 1080×1080" width={600} height={600}>
            <window.SocialSquare brand={brand} kind="quote" mark={mark} size={600}/>
          </window.DCArtboard>
          <window.DCArtboard id="social-2" label="Social · mark 1080×1080" width={600} height={600}>
            <window.SocialSquare brand={brand} kind="mark" mark={mark} size={600}/>
          </window.DCArtboard>
        </window.DCSection>

        {/* ── Section 6: Brand guidelines ───────────────────── */}
        <window.DCSection id="guidelines" title="Brand guidelines" subtitle="A short reference for using the Heda mark">
          <window.DCArtboard id="bg" label="Guidelines · v1" width={900} height={1280}>
            <window.BrandGuidelines brand={brand} mark={mark}/>
          </window.DCArtboard>
        </window.DCSection>

      </window.DesignCanvas>

      <window.TweaksPanel>
        <window.TweakSection title="Brand direction">
          <window.TweakRadio
            value={dir}
            onChange={(v) => setTweak('primaryDirection', v)}
            options={[
              { value: 'sage',  label: 'A · Sage' },
              { value: 'plum',  label: 'B · Plum' },
              { value: 'stone', label: 'C · Stone' },
            ]}
          />
        </window.TweakSection>
        <window.TweakSection title="Logo mark">
          <window.TweakRadio
            value={mark}
            onChange={(v) => setTweak('primaryMark', v)}
            options={[
              { value: 'aura',  label: 'Aura' },
              { value: 'pulse', label: 'Pulse' },
              { value: 'crown', label: 'Crown' },
            ]}
          />
        </window.TweakSection>
      </window.TweaksPanel>
    </>
  );
}

function DeviceWrap({ children }) {
  // Render a simplified phone bezel since we want consistent sizing
  return (
    <div style={{
      width: 410, height: 860, padding: 10,
      background: '#0a0a0a', borderRadius: 44,
      boxShadow: '0 20px 60px rgba(0,0,0,0.35), inset 0 0 0 1px rgba(255,255,255,0.05)',
    }}>
      <div style={{ width: '100%', height: '100%', borderRadius: 36, overflow: 'hidden', position: 'relative' }}>
        {children}
      </div>
    </div>
  );
}

function MarkStudy({ brand, mark, name, rationale }) {
  const Mark = { aura: window.MarkAura, pulse: window.MarkPulse, crown: window.MarkCrown }[mark];
  return (
    <div style={{
      width: '100%', height: '100%', background: brand.bg,
      color: brand.text, fontFamily: brand.sans,
      padding: 36, display: 'flex', flexDirection: 'column',
      gap: 22, position: 'relative',
    }}>
      <div style={{ fontFamily: brand.mono, fontSize: 10, letterSpacing: 1.4, color: brand.textDim }}>
        MARK · {name.toUpperCase()}
      </div>
      <div style={{
        flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center',
        background: brand.bgCard, borderRadius: 12, border: `1px solid ${brand.line}`,
        position: 'relative', overflow: 'hidden',
      }}>
        <Mark size={140} color={brand.accent}/>
      </div>
      <div style={{ fontFamily: brand.serif, fontSize: 16, lineHeight: 1.45, color: brand.textMute }}>
        {rationale}
      </div>
      <div style={{ display: 'flex', gap: 14, alignItems: 'center', justifyContent: 'space-between' }}>
        {[12, 18, 26, 40].map(s => (
          <div key={s} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6 }}>
            <Mark size={s} color={brand.text}/>
            <span style={{ fontFamily: brand.mono, fontSize: 9, color: brand.textDim }}>{s}px</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function IconGrid({ brands }) {
  return (
    <div style={{
      width: '100%', height: '100%', background: '#1a1a1a',
      padding: 36, display: 'flex', flexDirection: 'column', gap: 22,
      fontFamily: 'Inter Tight, system-ui, sans-serif',
    }}>
      <div style={{ color: '#999', fontFamily: 'JetBrains Mono, monospace', fontSize: 10, letterSpacing: 1.4 }}>
        APP ICON · ALL DIRECTIONS × ALL MARKS
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'auto repeat(3, 1fr)', gap: 16, alignItems: 'center' }}>
        <div/>
        {['Aura','Pulse','Crown'].map(m => (
          <div key={m} style={{ color: '#bbb', fontFamily: 'JetBrains Mono, monospace', fontSize: 10, letterSpacing: 1, textAlign: 'center' }}>{m.toUpperCase()}</div>
        ))}
        {brands.map(b => (
          <React.Fragment key={b.id}>
            <div style={{ color: b.accent, fontFamily: 'JetBrains Mono, monospace', fontSize: 10, letterSpacing: 1 }}>{b.short}</div>
            {['aura','pulse','crown'].map(m => (
              <div key={m} style={{ display: 'flex', justifyContent: 'center' }}>
                <window.AppIcon brand={b} mark={m} size={110}/>
              </div>
            ))}
          </React.Fragment>
        ))}
      </div>
    </div>
  );
}

function LauncherPreview({ brand, mark }) {
  // Mock Android launcher (a wallpaper grid with our icon among others).
  const otherApps = [
    { name: 'Photos',   color: '#3a4a8a' },
    { name: 'Maps',     color: '#3a8a5a' },
    { name: 'Health',   color: '#a83a3a' },
    { name: 'Calendar', color: '#7a3a8a' },
    { name: 'Notes',    color: '#c9a64a' },
    { name: 'Messages', color: '#3a8a8a' },
    { name: 'Browser',  color: '#4a4a4a' },
  ];
  return (
    <div style={{
      width: '100%', height: '100%',
      background: 'radial-gradient(ellipse at top, #2a2a30, #0a0a10)',
      padding: 26, display: 'flex', flexDirection: 'column', gap: 20,
      fontFamily: brand.sans, color: '#fff',
    }}>
      <div style={{ fontFamily: brand.mono, fontSize: 9, letterSpacing: 1.3, color: 'rgba(255,255,255,0.5)' }}>
        LAUNCHER PREVIEW
      </div>
      <div style={{ fontFamily: brand.serif, fontSize: 30, lineHeight: 1, opacity: 0.92 }}>9:30</div>
      <div style={{ fontSize: 13, opacity: 0.7 }}>Sun, 26 April</div>
      <div style={{ flex: 1 }}/>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 18, alignItems: 'end' }}>
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6 }}>
          <window.AppIcon brand={brand} mark={mark} size={64}/>
          <span style={{ fontSize: 11, color: '#fff', textShadow: '0 1px 2px rgba(0,0,0,0.6)' }}>Heda</span>
        </div>
        {otherApps.slice(0, 7).map((a, i) => (
          <div key={i} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6 }}>
            <div style={{ width: 64, height: 64, borderRadius: 14, background: a.color, opacity: 0.92, boxShadow: '0 4px 12px rgba(0,0,0,0.3)' }}/>
            <span style={{ fontSize: 11, color: 'rgba(255,255,255,0.85)', textShadow: '0 1px 2px rgba(0,0,0,0.6)' }}>{a.name}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>
